loggers=dev.resteasy,org.jboss.resteasy

logger.level=INFO
logger.handlers=CONSOLE

logger.dev.resteasy.level=${test.log.level:INFO}
logger.org.jboss.resteasy.level=${test.log.level:INFO}

handler.CONSOLE=org.jboss.logmanager.handlers.ConsoleHandler
handler.CONSOLE.formatter=COLOR-PATTERN
handler.CONSOLE.properties=autoFlush,target
handler.CONSOLE.autoFlush=true
handler.CONSOLE.target=SYSTEM_OUT

formatter.COLOR-PATTERN=org.jboss.logmanager.formatters.ColorPatternFormatter
formatter.COLOR-PATTERN.properties=pattern
formatter.COLOR-PATTERN.pattern=[test] %d{HH\:mm\:ss,SSS} %-5p [%c] (%t) %s%e%n

formatter.PATTERN=org.jboss.logmanager.formatters.PatternFormatter
formatter.PATTERN.properties=pattern
formatter.PATTERN.pattern=[test] %d{HH\:mm\:ss,SSS} %-5p [%c] (%t) %s%e%n